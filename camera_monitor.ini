# camera_monitor.ini — settings for camera_monitor.py
# Values are written back automatically when changed in the UI.

[monitor]
# Video source at startup
#   0 = Picamera2 CAM0  (IMX296 global shutter, CSI port 0)
#   1 = Picamera2 CAM1  (IMX296 global shutter, CSI port 1)
#   2 = OpenCV UVC      (USB webcam, V4L2 backend)
source              = 1

# Capture resolution index into CAPTURE_SIZES
#   0 = 640×480   1 = 1280×720   2 = 1456×1088 (native IMX296)
size                = 2

# Rotation per source, in degrees (0 / 90 / 180 / 270)
rotation_0          = 180
rotation_1          = 180
rotation_2          = 0

[output]
# Directory for Space-key snapshots.
# Leave empty to use the value from robot.ini [output] images_dir,
# or ~/Pictures/HackyRacingRobot if that is also unset.
images_dir          = 
