# =============================================================================
# track.toml — HackyRacingRobot gate / course definition
# =============================================================================
#
# TAG NUMBERING CONVENTION
# ------------------------
# Each gate post carries two ArUco markers: one on the front face and one
# on the rear face.  Tags 0–99 are front-facing, 100–199 are rear-facing.
#
# For a CLOCKWISE circular track:
#   Outside post (left  when approaching): EVEN tags
#   Inside  post (right when approaching): ODD  tags
#
# Gate N tag layout:
#
#   outside post  front : N * 2              (gate 0→0,  gate 1→2,  gate 2→4 …)
#   outside post  rear  : 100 + N * 2       (gate 0→100, gate 1→102 …)
#   inside  post  front : N * 2 + 1         (gate 0→1,  gate 1→3,  gate 2→5 …)
#   inside  post  rear  : 100 + N * 2 + 1   (gate 0→101, gate 1→103 …)
#
# Visualised for gate 0 (direction of travel →):
#
#   ┌─────────────────┐         ┌─────────────────┐
#   │  outside post   │  1.0 m  │   inside post   │
#   │  front:   0     │◄───────►│  front:   1     │
#   │  rear:  100     │         │  rear:  101     │
#   └─────────────────┘         └─────────────────┘
#        (even tags)                  (odd tags)
#
# DIRECTION DETECTION
# -------------------
# Front tags (0–99)    visible → robot approaching the gate correctly
# Rear  tags (100–199) visible → robot has passed through, or approaching
#                                from the wrong direction
#
# =============================================================================


[course]
name        = "Test Track A"
description = "5-gate clockwise circuit, outdoor grass"
author      = ""
version     = 1
loop        = false   # true = return to gate 0 after final gate (circuit racing)


[course.sequence]
gates = [0, 1, 2, 3, 4]   # gate ids in navigation order; repeat for circuits


# ── Gate definitions ──────────────────────────────────────────────────────────
#
# outside = left post  when approaching  (even tags)
# inside  = right post when approaching  (odd  tags)
#
# width_m      : gate opening, post centre-to-centre (metres)
# heading_hint : compass bearing passing through this gate in degrees true
#                (0 = North, 90 = East).  Use -1 to disable.

[[gate]]
id            = 0
label         = "Start / Finish"
outside_front = 0
outside_rear  = 100
inside_front  = 1
inside_rear   = 101
width_m       = 1.2
heading_hint  = 0.0
notes         = "Start line; robot launched facing north"

[[gate]]
id            = 1
label         = "Gate 1"
outside_front = 2
outside_rear  = 102
inside_front  = 3
inside_rear   = 103
width_m       = 1.0
heading_hint  = -1.0
notes         = ""

[[gate]]
id            = 2
label         = "Gate 2"
outside_front = 4
outside_rear  = 104
inside_front  = 5
inside_rear   = 105
width_m       = 1.0
heading_hint  = -1.0
notes         = ""

[[gate]]
id            = 3
label         = "Gate 3"
outside_front = 6
outside_rear  = 106
inside_front  = 7
inside_rear   = 107
width_m       = 1.0
heading_hint  = -1.0
notes         = ""

[[gate]]
id            = 4
label         = "Gate 4"
outside_front = 8
outside_rear  = 108
inside_front  = 9
inside_rear   = 109
width_m       = 1.0
heading_hint  = -1.0
notes         = ""
