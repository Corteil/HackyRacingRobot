# =============================================================================
# track.toml — HackyRacingRobot gate / course definition
# =============================================================================
#
# TAG NUMBERING CONVENTION
# ------------------------
# Tags   0–99  : front-facing (robot approaching the gate)
# Tags 100–199 : rear-facing  (robot has passed through)
#
# For a clockwise circuit:
#   Outside post (left  when approaching): EVEN tags
#   Inside  post (right when approaching): ODD  tags
#
# Gate N:
#   outside_front = N * 2           inside_front = N * 2 + 1
#   outside_rear  = 100 + N * 2     inside_rear  = 100 + N * 2 + 1
# =============================================================================

[course]
name        = "Test Track A"
description = "5-gate clockwise circuit, outdoor grass"
author      = ""
version     = 1
loop        = true

[course.sequence]
gates = [0, 1]

[[gate]]
id            = 0
label         = "Start / Finish"
outside_front = 1
outside_rear  = 101
inside_front  = 2
inside_rear   = 100
width_m       = 1.00
heading_hint  = -1.0
notes         = ""

[[gate]]
id            = 1
label         = "Gate 1"
outside_front = 3
outside_rear  = 103
inside_front  = 4
inside_rear   = 102
width_m       = 1.00
heading_hint  = -1.0
notes         = ""
